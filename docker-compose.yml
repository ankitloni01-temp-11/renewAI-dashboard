version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      # Map host 8005 to container 8000
      - "8005:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGCHAIN_TRACING_V2=true
      - LANGSMITH_PROJECT=RenewAI
      - DEBUG=true
    volumes:
      # Persist databases across container restarts
      - ./backend/database:/app/database
      - ./backend/chroma_db:/app/chroma_db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
